<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <title>InvoicePro | מערכת חשבוניות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #060b18;
      --bg2: #0d1528;
      --bg3: #111c35;
      --surface: #162040;
      --surface2: #1d2a52;
      --border: #243060;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --gold: #f59e0b;
      --gold2: #fbbf24;
      --green: #10b981;
      --green2: #34d399;
      --red: #ef4444;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ─── LAYOUT ─── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      background: var(--bg);
      overflow: hidden;
    }

    /* ─── HEADER ─── */
    .header {
      background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px 12px;
      flex-shrink: 0;
      position: relative;
      z-index: 10;
    }
    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent2); }

    .btn-new {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
      transition: all 0.2s;
    }
    .btn-new:active { transform: scale(0.95); }

    /* ─── TABS ─── */
    .tabs {
      display: flex;
      gap: 8px;
    }
    .tab {
      flex: 1;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .tab.active {
      background: var(--surface);
      border-color: var(--accent);
      color: var(--accent2);
    }
    .tab .badge {
      background: var(--accent);
      color: #fff;
      border-radius: 20px;
      padding: 1px 7px;
      font-size: 11px;
      font-weight: 700;
      min-width: 20px;
      text-align: center;
    }
    .tab.active-done .badge { background: var(--green); }
    .tab.active-done { border-color: var(--green); color: var(--green2); }

    /* ─── CONTENT ─── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }
    .content::-webkit-scrollbar { width: 3px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ─── SEARCH ─── */
    .search-box {
      position: relative;
      margin-bottom: 14px;
    }
    .search-box input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 38px 10px 14px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
    }
    .search-box input::placeholder { color: var(--text3); }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-icon {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 15px;
    }

    /* ─── INVOICE CARD ─── */
    .invoice-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .invoice-card::before {
      content: '';
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--gold);
      border-radius: 0 var(--radius) var(--radius) 0;
    }
    .invoice-card.done::before { background: var(--green); }
    .invoice-card:active { transform: scale(0.98); }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .client-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
    }
    .invoice-num {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }
    .amount-badge {
      background: linear-gradient(135deg, var(--gold) 0%, #d97706 100%);
      color: #000;
      border-radius: var(--radius-sm);
      padding: 4px 10px;
      font-size: 15px;
      font-weight: 800;
      white-space: nowrap;
    }
    .invoice-card.done .amount-badge {
      background: linear-gradient(135deg, var(--green) 0%, #059669 100%);
      color: #fff;
    }

    .card-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 12px;
    }
    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .detail-label { font-size: 10px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .detail-value { font-size: 13px; color: var(--text2); font-weight: 500; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .status-pill {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
    }
    .status-pill.pending {
      background: rgba(245,158,11,0.15);
      color: var(--gold2);
      border: 1px solid rgba(245,158,11,0.3);
    }
    .status-pill.done {
      background: rgba(16,185,129,0.15);
      color: var(--green2);
      border: 1px solid rgba(16,185,129,0.3);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; }
    .status-pill.pending .status-dot { background: var(--gold); animation: pulse 2s infinite; }
    .status-pill.done .status-dot { background: var(--green); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .card-actions {
      display: flex; gap: 6px;
    }
    .btn-icon {
      width: 32px; height: 32px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: all 0.2s;
    }
    .btn-icon:active { transform: scale(0.9); }
    .btn-icon.mark-done { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: var(--green2); }
    .btn-icon.mark-pending { background: rgba(245,158,11,0.15); border-color: rgba(245,158,11,0.4); color: var(--gold2); }
    .btn-icon.del { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #f87171; }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
    }
    .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.4; }
    .empty-title { font-size: 18px; font-weight: 700; color: var(--text2); margin-bottom: 8px; }
    .empty-sub { font-size: 14px; color: var(--text3); }

    /* ─── STATS BAR ─── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px;
      text-align: center;
    }
    .stat-num { font-size: 20px; font-weight: 800; }
    .stat-label { font-size: 10px; color: var(--text3); font-weight: 500; margin-top: 2px; }
    .stat-card.pending-stat .stat-num { color: var(--gold2); }
    .stat-card.done-stat .stat-num { color: var(--green2); }
    .stat-card.total-stat .stat-num { color: var(--accent2); }

    /* ─── MODAL OVERLAY ─── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 480px;
      max-height: 92dvh;
      overflow-y: auto;
      padding: 20px 20px 40px;
      animation: slideUp 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slideUp {
      from { transform: translateY(100%); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .modal::-webkit-scrollbar { width: 3px; }
    .modal::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .modal-handle {
      width: 36px; height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal-title {
      font-size: 20px; font-weight: 800;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-title-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }

    /* ─── FORM ─── */
    .form-section {
      margin-bottom: 16px;
    }
    .form-section-title {
      font-size: 11px; font-weight: 700;
      color: var(--text3);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px;
      display: flex; align-items: center; gap: 6px;
    }
    .form-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
    .form-group label { font-size: 12px; color: var(--text2); font-weight: 600; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 14px;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent);
      background: var(--surface2);
    }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .form-group select option { background: var(--bg2); }

    /* ─── ITEMS TABLE ─── */
    .items-table { margin-bottom: 10px; }
    .item-row {
      display: grid;
      grid-template-columns: 1fr 70px 80px 32px;
      gap: 6px;
      margin-bottom: 6px;
      align-items: start;
    }
    .item-row input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      width: 100%;
    }
    .item-row input:focus { outline: none; border-color: var(--accent); background: var(--surface2); }
    .btn-remove-item {
      width: 32px; height: 36px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: var(--radius-sm);
      color: #f87171;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .btn-add-item {
      width: 100%;
      padding: 8px;
      background: rgba(59,130,246,0.1);
      border: 1px dashed rgba(59,130,246,0.4);
      border-radius: var(--radius-sm);
      color: var(--accent2);
      font-family: 'Heebo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s;
    }
    .btn-add-item:hover { background: rgba(59,130,246,0.2); }

    .items-header {
      display: grid;
      grid-template-columns: 1fr 70px 80px 32px;
      gap: 6px;
      margin-bottom: 6px;
    }
    .items-header span {
      font-size: 10px; color: var(--text3); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 0 10px;
    }

    /* ─── TOTALS ─── */
    .totals-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      margin-bottom: 16px;
    }
    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text2);
    }
    .total-row.main {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold2);
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      margin-bottom: 0;
    }

    /* ─── FORM ACTIONS ─── */
    .form-actions {
      display: flex; gap: 10px;
    }
    .btn-cancel {
      flex: 1;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-family: 'Heebo', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-save {
      flex: 2;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 15px; font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(59,130,246,0.3);
      transition: all 0.2s;
    }
    .btn-save:active { transform: scale(0.97); }

    /* ─── VIEW MODAL ─── */
    .view-invoice-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .view-company { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
    .view-client { font-size: 22px; font-weight: 800; }
    .view-amount { text-align: left; }
    .view-amount-num { font-size: 28px; font-weight: 900; color: var(--gold2); }
    .view-amount-label { font-size: 11px; color: var(--text3); text-align: center; }

    .view-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .view-field { display: flex; flex-direction: column; gap: 3px; }
    .view-field-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
    .view-field-value { font-size: 14px; color: var(--text); font-weight: 500; }

    .view-items-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 16px;
      font-size: 13px;
    }
    .view-items-table th {
      background: var(--surface2);
      padding: 8px 10px;
      text-align: right;
      color: var(--text3);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
    }
    .view-items-table td {
      padding: 9px 10px;
      border-bottom: 1px solid var(--border);
      color: var(--text2);
    }
    .view-items-table tr:last-child td { border-bottom: none; }

    .view-totals {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      margin-bottom: 20px;
    }
    .view-total-row {
      display: flex; justify-content: space-between;
      font-size: 13px; color: var(--text2);
      margin-bottom: 6px;
    }
    .view-total-row.grand {
      font-size: 17px; font-weight: 800;
      color: var(--text);
      margin-top: 8px; padding-top: 8px;
      border-top: 1px solid var(--border);
      margin-bottom: 0;
    }

    .view-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .btn-mark-done {
      padding: 12px;
      background: linear-gradient(135deg, var(--green), #059669);
      border: none;
      border-radius: var(--radius-sm);
      color: #fff;
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-mark-pending {
      padding: 12px;
      background: linear-gradient(135deg, var(--gold), #d97706);
      border: none;
      border-radius: var(--radius-sm);
      color: #000;
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-edit-view {
      padding: 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text2);
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .notes-box {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5;
      border-right: 3px solid var(--accent);
    }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 30px;
      padding: 10px 20px;
      font-size: 14px; font-weight: 600;
      color: var(--text);
      z-index: 999;
      opacity: 0;
      transition: all 0.3s;
      white-space: nowrap;
      box-shadow: var(--shadow);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Confirm dialog */
    .confirm-box {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
    }
    .confirm-box.open { display: flex; }
    .confirm-inner {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: calc(100% - 40px);
      max-width: 340px;
    }
    .confirm-title { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
    .confirm-msg { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
    .confirm-btns { display: flex; gap: 10px; }
    .confirm-btns button {
      flex: 1; padding: 11px;
      border-radius: var(--radius-sm);
      font-family: 'Heebo', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; border: none;
    }
    .confirm-cancel { background: var(--surface); color: var(--text2); border: 1px solid var(--border) !important; }
    .confirm-ok { background: var(--red); color: #fff; }

    /* ─── DESKTOP LAYOUT ─── */
    @media (min-width: 480px) {
      body { background: #03060f; }
      #app {
        box-shadow: 0 0 60px rgba(0,0,0,0.8);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
      }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">

    <div class="tabs">

        ⏳ ממתינות
        <span class="badge" id="badge-pending">0</span>
      </button>
      <button class="tab" id="tab-done" onclick="setTab('done')">

  <!-- CONTENT -->
  <div class="content" id="content">
    <div class="stats-bar" id="stats-bar">
      <div class="stat-card pending-stat">
        <div class="stat-num" id="stat-pending-count">0</div>
        <div class="stat-label">ממתינות</div>

      </div>

    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="חיפוש לפי שם / מס' חשבונית..." oninput="renderList()">
    </div>

    <div id="list-container"></div>
  </div>

</div>

<!-- ─── NEW / EDIT MODAL ─── -->
<div class="overlay" id="form-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="form-modal">
    <div class="modal-handle"></div>
    <div class="modal-title">
      <div class="modal-title-icon">📝</div>
      <span id="modal-title-text">חשבונית חדשה</span>
    </div>

    <!-- Client Info -->
    <div class="form-section">
      <div class="form-section-title">פרטי לקוח</div>
      <div class="form-row">
        <div class="form-group">
          <label>שם פרטי *</label>
          <input type="text" id="f-first" placeholder="ישראל">
        </div>
        <div class="form-group">
          <label>שם משפחה *</label>
          <input type="text" id="f-last" placeholder="ישראלי">
        </div>
      </div>
      <div class="form-group">
        <label>שם חברה</label>
        <input type="text" id="f-company" placeholder="חברת ישראלי בע״מ">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>טלפון</label>
          <input type="tel" id="f-phone" placeholder="050-0000000">
        </div>
        <div class="form-group">
          <label>אימייל</label>
          <input type="email" id="f-email" placeholder="mail@example.com">
        </div>
      </div>
      <div class="form-group">
        <label>כתובת</label>
        <input type="text" id="f-address" placeholder="רחוב הרצל 1, תל אביב">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>ע.מ / ח.פ</label>
          <input type="text" id="f-taxid" placeholder="123456789">
        </div>
        <div class="form-group">
          <label>תאריך חשבונית</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>תאריך פירעון</label>
          <input type="date" id="f-due">
        </div>
        <div class="form-group">
          <label>אמצעי תשלום</label>
          <select id="f-payment">
            <option value="העברה בנקאית">העברה בנקאית</option>
            <option value="מזומן">מזומן</option>
            <option value="צ'ק">צ'ק</option>
            <option value="כרטיס אשראי">כרטיס אשראי</option>
            <option value="ביט/פייבוקס">ביט/פייבוקס</option>
            <option value="אחר">אחר</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Items -->
    <div class="form-section">
      <div class="form-section-title">פריטים / שירותים</div>
      <div class="items-header">
        <span>תיאור</span>
        <span>כמות</span>
        <span>מחיר</span>
        <span></span>
      </div>
      <div id="items-container"></div>
      <button class="btn-add-item" onclick="addItem()">＋ הוסף פריט</button>
    </div>

    <!-- Discount & VAT -->
    <div class="form-section">
      <div class="form-section-title">מיסים והנחות</div>
      <div class="form-row">
        <div class="form-group">
          <label>הנחה (%)</label>
          <input type="number" id="f-discount" placeholder="0" min="0" max="100" oninput="updateTotals()">
        </div>
        <div class="form-group">
          <label>מע"מ (%)</label>
          <input type="number" id="f-vat" placeholder="18" min="0" max="100" value="18" oninput="updateTotals()">
        </div>
      </div>
    </div>

    <!-- Totals preview -->
    <div class="totals-box" id="totals-preview">
      <div class="total-row"><span>סכום ביניים</span><span id="t-subtotal">₪0.00</span></div>
      <div class="total-row"><span>הנחה</span><span id="t-discount">-₪0.00</span></div>
      <div class="total-row"><span>מע"מ</span><span id="t-vat">₪0.00</span></div>
      <div class="total-row main"><span>סה"כ לתשלום</span><span id="t-total">₪0.00</span></div>
    </div>

    <!-- Notes -->
    <div class="form-section">
      <div class="form-section-title">הערות</div>
      <div class="form-group">
        <textarea id="f-notes" placeholder="הערות נוספות לחשבונית..."></textarea>
      </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal('form-overlay')">ביטול</button>
      <button class="btn-save" onclick="saveInvoice()">💾 שמור חשבונית</button>
    </div>
  </div>
</div>

<!-- ─── VIEW MODAL ─── -->
<div class="overlay" id="view-overlay" onclick="handleViewOverlayClick(event)">
  <div class="modal" id="view-modal">
    <div class="modal-handle"></div>
    <div id="view-content"></div>
  </div>
</div>

<!-- ─── CONFIRM DIALOG ─── -->
<div class="confirm-box" id="confirm-box">
  <div class="confirm-inner">
    <div class="confirm-title" id="confirm-title">מחיקת חשבונית</div>
    <div class="confirm-msg" id="confirm-msg">האם אתה בטוח? פעולה זו אינה ניתנת לביטול.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">ביטול</button>
      <button class="confirm-ok" id="confirm-ok-btn" onclick="confirmAction()">מחק</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────
let invoices = JSON.parse(localStorage.getItem('invoices_pro') || '[]');
let currentTab = 'pending';
let editingId = null;
let currentViewId = null;
let pendingConfirmAction = null;

// ─── UTILS ───────────────────────────────────────────────
function save() {
  localStorage.setItem('invoices_pro', JSON.stringify(invoices));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function genInvoiceNum() {
  const last = invoices.reduce((max, inv) => {
    const n = parseInt(inv.invoiceNum) || 0;
    return n > max ? n : max;
  }, 1000);
  return (last + 1).toString();
}

function formatMoney(n) {
  return '₪' + parseFloat(n || 0).toLocaleString('he-IL', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function formatDate(d) {
  if (!d) return '—';
  const parts = d.split('-');
  return parts[2] + '/' + parts[1] + '/' + parts[0];
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = color || 'var(--border)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

function dueDateISO() {
  const d = new Date();
  d.setDate(d.getDate() + 30);
  return d.toISOString().split('T')[0];
}

// ─── TABS ────────────────────────────────────────────────
function setTab(tab) {
  currentTab = tab;
  document.getElementById('tab-pending').className = 'tab' + (tab === 'pending' ? ' active' : '');
  document.getElementById('tab-done').className = 'tab' + (tab === 'done' ? ' active-done' : '');
  document.getElementById('search-input').value = '';
  renderList();
}

// ─── RENDER LIST ─────────────────────────────────────────
function renderList() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const filtered = invoices.filter(inv => {
    const matchTab = inv.status === currentTab;
    const matchSearch = !search ||
      (inv.firstName + ' ' + inv.lastName).toLowerCase().includes(search) ||
      inv.company.toLowerCase().includes(search) ||
      inv.invoiceNum.toLowerCase().includes(search);
    return matchTab && matchSearch;
  });

  const pending = invoices.filter(i => i.status === 'pending');
  const done = invoices.filter(i => i.status === 'done');
  const totalPending = pending.reduce((s, i) => s + (i.total || 0), 0);

  document.getElementById('badge-pending').textContent = pending.length;
  document.getElementById('badge-done').textContent = done.length;
  document.getElementById('stat-pending-count').textContent = pending.length;
  document.getElementById('stat-done-count').textContent = done.length;
  document.getElementById('stat-total-amount').textContent =
    totalPending >= 1000 ? '₪' + (totalPending/1000).toFixed(1) + 'K' : formatMoney(totalPending);

  const container = document.getElementById('list-container');

  if (filtered.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">${currentTab === 'pending' ? '⏳' : '✅'}</div>
        <div class="empty-title">${currentTab === 'pending' ? 'אין חשבוניות ממתינות' : 'אין חשבוניות שבוצעו'}</div>
        <div class="empty-sub">${currentTab === 'pending' ? 'לחץ על "חשבונית חדשה" כדי להתחיל' : 'סמן חשבוניות כ"בוצע" כדי שיופיעו כאן'}</div>
      </div>`;
    return;
  }

  // Sort by date desc
  const sorted = [...filtered].sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  container.innerHTML = sorted.map(inv => `
    <div class="invoice-card ${inv.status}" onclick="openView('${inv.id}')">
      <div class="card-top">
        <div>
          <div class="client-name">${inv.firstName} ${inv.lastName}${inv.company ? ' · ' + inv.company : ''}</div>
          <div class="invoice-num">חשבונית #${inv.invoiceNum} · ${formatDate(inv.date)}</div>
        </div>
        <div class="amount-badge">${formatMoney(inv.total)}</div>
      </div>
      <div class="card-details">
        <div class="detail-item">
          <span class="detail-label">טלפון</span>
          <span class="detail-value">${inv.phone || '—'}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">פירעון</span>
          <span class="detail-value">${formatDate(inv.due)}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">תשלום</span>
          <span class="detail-value">${inv.payment || '—'}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label">פריטים</span>
          <span class="detail-value">${(inv.items || []).length} פריטים</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="status-pill ${inv.status}">
          <div class="status-dot"></div>
          ${inv.status === 'pending' ? 'ממתין להעברה' : 'בוצע'}
        </div>
        <div class="card-actions" onclick="event.stopPropagation()">
          ${inv.status === 'pending'
            ? `<button class="btn-icon mark-done" title="סמן כבוצע" onclick="toggleStatus('${inv.id}')">✓</button>`
            : `<button class="btn-icon mark-pending" title="החזר לממתין" onclick="toggleStatus('${inv.id}')">↩</button>`
          }
          <button class="btn-icon" title="ערוך" onclick="openEdit('${inv.id}')">✏️</button>
          <button class="btn-icon del" title="מחק" onclick="askDelete('${inv.id}')">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ─── STATUS TOGGLE ───────────────────────────────────────
function toggleStatus(id) {
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  const prev = inv.status;
  inv.status = inv.status === 'pending' ? 'done' : 'pending';
  save();
  showToast(inv.status === 'done' ? '✅ סומן כבוצע!' : '⏳ הוחזר לממתין', inv.status === 'done' ? 'var(--green)' : 'var(--gold)');
  renderList();
  if (document.getElementById('view-overlay').classList.contains('open')) {
    openView(id);
  }
}

// ─── DELETE ──────────────────────────────────────────────
let deleteTargetId = null;
function askDelete(id) {
  deleteTargetId = id;
  document.getElementById('confirm-box').classList.add('open');
}
function closeConfirm() {
  document.getElementById('confirm-box').classList.remove('open');
  deleteTargetId = null;
}
function confirmAction() {
  if (deleteTargetId) {
    invoices = invoices.filter(i => i.id !== deleteTargetId);
    save();
    renderList();
    showToast('🗑 חשבונית נמחקה', 'var(--red)');
    closeConfirm();
    closeModal('view-overlay');
  }
}

// ─── VIEW ────────────────────────────────────────────────
function openView(id) {
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  currentViewId = id;

  const itemsRows = (inv.items || []).map(it => `
    <tr>
      <td>${it.desc}</td>
      <td style="text-align:center">${it.qty}</td>
      <td style="text-align:left">${formatMoney(it.price)}</td>
      <td style="text-align:left">${formatMoney(it.qty * it.price)}</td>
    </tr>
  `).join('');

  const subtotal = (inv.items || []).reduce((s, it) => s + it.qty * it.price, 0);
  const discountAmt = subtotal * ((inv.discount || 0) / 100);
  const afterDisc = subtotal - discountAmt;
  const vatAmt = afterDisc * ((inv.vat || 0) / 100);

  document.getElementById('view-content').innerHTML = `
    <div class="view-invoice-header">
      <div>
        <div class="view-company">${inv.company || ''}</div>
        <div class="view-client">${inv.firstName} ${inv.lastName}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:4px">חשבונית #${inv.invoiceNum}</div>
      </div>
      <div class="view-amount">
        <div class="view-amount-num">${formatMoney(inv.total)}</div>
        <div class="view-amount-label">סה"כ לתשלום</div>
        <div style="margin-top:6px">
          <div class="status-pill ${inv.status}" style="justify-content:center">
            <div class="status-dot"></div>
            ${inv.status === 'pending' ? 'ממתין' : 'בוצע'}
          </div>
        </div>
      </div>
    </div>

    <div class="view-grid">
      <div class="view-field"><span class="view-field-label">תאריך חשבונית</span><span class="view-field-value">${formatDate(inv.date)}</span></div>
      <div class="view-field"><span class="view-field-label">תאריך פירעון</span><span class="view-field-value">${formatDate(inv.due)}</span></div>
      <div class="view-field"><span class="view-field-label">טלפון</span><span class="view-field-value">${inv.phone || '—'}</span></div>
      <div class="view-field"><span class="view-field-label">אימייל</span><span class="view-field-value">${inv.email || '—'}</span></div>
      <div class="view-field"><span class="view-field-label">כתובת</span><span class="view-field-value">${inv.address || '—'}</span></div>
      <div class="view-field"><span class="view-field-label">אמצעי תשלום</span><span class="view-field-value">${inv.payment || '—'}</span></div>
      ${inv.taxId ? `<div class="view-field"><span class="view-field-label">ע.מ / ח.פ</span><span class="view-field-value">${inv.taxId}</span></div>` : ''}
    </div>

    ${itemsRows ? `
    <table class="view-items-table">
      <thead><tr><th>תיאור</th><th>כמות</th><th>מחיר</th><th>סה"כ</th></tr></thead>
      <tbody>${itemsRows}</tbody>
    </table>` : ''}

    <div class="view-totals">
      <div class="view-total-row"><span>סכום ביניים</span><span>${formatMoney(subtotal)}</span></div>
      ${inv.discount > 0 ? `<div class="view-total-row"><span>הנחה (${inv.discount}%)</span><span>-${formatMoney(discountAmt)}</span></div>` : ''}
      ${inv.vat > 0 ? `<div class="view-total-row"><span>מע"מ (${inv.vat}%)</span><span>${formatMoney(vatAmt)}</span></div>` : ''}
      <div class="view-total-row grand"><span>סה"כ לתשלום</span><span>${formatMoney(inv.total)}</span></div>
    </div>

    ${inv.notes ? `<div class="notes-box">📝 ${inv.notes}</div>` : ''}

    <div class="view-actions">
      ${inv.status === 'pending'
        ? `<button class="btn-mark-done" onclick="toggleStatus('${inv.id}');closeModal('view-overlay')">✅ סמן כבוצע</button>`
        : `<button class="btn-mark-pending" onclick="toggleStatus('${inv.id}');closeModal('view-overlay')">↩ החזר לממתין</button>`
      }
      <button class="btn-edit-view" onclick="closeModal('view-overlay');openEdit('${inv.id}')">✏️ עריכה</button>
    </div>
    <div style="margin-top:10px">
      <button class="btn-cancel" style="width:100%;padding:11px;border-radius:8px;font-family:Heebo;font-size:14px;font-weight:600;cursor:pointer;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171;" onclick="askDelete('${inv.id}')">🗑 מחק חשבונית</button>
    </div>
  `;

  document.getElementById('view-overlay').classList.add('open');
}

// ─── MODAL HELPERS ───────────────────────────────────────
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('form-overlay')) closeModal('form-overlay');
}
function handleViewOverlayClick(e) {
  if (e.target === document.getElementById('view-overlay')) closeModal('view-overlay');
}

// ─── FORM ────────────────────────────────────────────────
function openNewModal() {
  editingId = null;
  document.getElementById('modal-title-text').textContent = 'חשבונית חדשה';
  clearForm();
  document.getElementById('f-date').value = todayISO();
  document.getElementById('f-due').value = dueDateISO();
  document.getElementById('items-container').innerHTML = '';
  addItem();
  updateTotals();
  document.getElementById('form-overlay').classList.add('open');
}

function openEdit(id) {
  const inv = invoices.find(i => i.id === id);
  if (!inv) return;
  editingId = id;
  document.getElementById('modal-title-text').textContent = 'עריכת חשבונית #' + inv.invoiceNum;
  clearForm();
  document.getElementById('f-first').value = inv.firstName || '';
  document.getElementById('f-last').value = inv.lastName || '';
  document.getElementById('f-company').value = inv.company || '';
  document.getElementById('f-phone').value = inv.phone || '';
  document.getElementById('f-email').value = inv.email || '';
  document.getElementById('f-address').value = inv.address || '';
  document.getElementById('f-taxid').value = inv.taxId || '';
  document.getElementById('f-date').value = inv.date || todayISO();
  document.getElementById('f-due').value = inv.due || '';
  document.getElementById('f-payment').value = inv.payment || '';
  document.getElementById('f-discount').value = inv.discount || 0;
  document.getElementById('f-vat').value = inv.vat !== undefined ? inv.vat : 18;
  document.getElementById('f-notes').value = inv.notes || '';

  document.getElementById('items-container').innerHTML = '';
  (inv.items || []).forEach(it => addItem(it.desc, it.qty, it.price));
  updateTotals();
  document.getElementById('form-overlay').classList.add('open');
}

function clearForm() {
  ['f-first','f-last','f-company','f-phone','f-email','f-address','f-taxid','f-notes'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('f-discount').value = 0;
  document.getElementById('f-vat').value = 18;
  document.getElementById('f-payment').value = 'העברה בנקאית';
}

// ─── ITEMS ───────────────────────────────────────────────
let itemCount = 0;
function addItem(desc='', qty=1, price=0) {
  itemCount++;
  const id = 'item-' + itemCount;
  const row = document.createElement('div');
  row.className = 'item-row';
  row.id = id;
  row.innerHTML = `
    <input type="text" placeholder="תיאור שירות/מוצר" value="${desc}" oninput="updateTotals()">
    <input type="number" placeholder="כמות" value="${qty}" min="1" oninput="updateTotals()">
    <input type="number" placeholder="מחיר" value="${price || ''}" min="0" step="0.01" oninput="updateTotals()">
    <button class="btn-remove-item" onclick="removeItem('${id}')">×</button>
  `;
  document.getElementById('items-container').appendChild(row);
  updateTotals();
}

function removeItem(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
  updateTotals();
}

function getItems() {
  const rows = document.querySelectorAll('#items-container .item-row');
  return Array.from(rows).map(row => {
    const inputs = row.querySelectorAll('input');
    return {
      desc: inputs[0].value.trim(),
      qty: parseFloat(inputs[1].value) || 0,
      price: parseFloat(inputs[2].value) || 0,
    };
  }).filter(it => it.desc || it.price > 0);
}

function updateTotals() {
  const items = getItems();
  const subtotal = items.reduce((s, it) => s + it.qty * it.price, 0);
  const disc = parseFloat(document.getElementById('f-discount').value) || 0;
  const vat = parseFloat(document.getElementById('f-vat').value) || 0;
  const discAmt = subtotal * (disc / 100);
  const afterDisc = subtotal - discAmt;
  const vatAmt = afterDisc * (vat / 100);
  const total = afterDisc + vatAmt;

  document.getElementById('t-subtotal').textContent = formatMoney(subtotal);
  document.getElementById('t-discount').textContent = '-' + formatMoney(discAmt);
  document.getElementById('t-vat').textContent = formatMoney(vatAmt);
  document.getElementById('t-total').textContent = formatMoney(total);
}

// ─── SAVE ────────────────────────────────────────────────
function saveInvoice() {
  const firstName = document.getElementById('f-first').value.trim();
  const lastName = document.getElementById('f-last').value.trim();
  if (!firstName || !lastName) {
    showToast('⚠️ נא להזין שם ושם משפחה', 'var(--red)');
    document.getElementById('f-first').focus();
    return;
  }

  const items = getItems();
  const subtotal = items.reduce((s, it) => s + it.qty * it.price, 0);
  const disc = parseFloat(document.getElementById('f-discount').value) || 0;
  const vat = parseFloat(document.getElementById('f-vat').value) || 0;
  const discAmt = subtotal * (disc / 100);
  const afterDisc = subtotal - discAmt;
  const vatAmt = afterDisc * (vat / 100);
  const total = afterDisc + vatAmt;

  if (editingId) {
    const idx = invoices.findIndex(i => i.id === editingId);
    if (idx !== -1) {
      invoices[idx] = {
        ...invoices[idx],
        firstName, lastName,
        company: document.getElementById('f-company').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        email: document.getElementById('f-email').value.trim(),
        address: document.getElementById('f-address').value.trim(),
        taxId: document.getElementById('f-taxid').value.trim(),
        date: document.getElementById('f-date').value,
        due: document.getElementById('f-due').value,
        payment: document.getElementById('f-payment').value,
        discount: disc, vat, items, total,
        notes: document.getElementById('f-notes').value.trim(),
      };
    }
    showToast('✏️ חשבונית עודכנה בהצלחה!', 'var(--accent)');
  } else {
    const inv = {
      id: genId(),
      invoiceNum: genInvoiceNum(),
      createdAt: Date.now(),
      status: 'pending',
      firstName, lastName,
      company: document.getElementById('f-company').value.trim(),
      phone: document.getElementById('f-phone').value.trim(),
      email: document.getElementById('f-email').value.trim(),
      address: document.getElementById('f-address').value.trim(),
      taxId: document.getElementById('f-taxid').value.trim(),
      date: document.getElementById('f-date').value,
      due: document.getElementById('f-due').value,
      payment: document.getElementById('f-payment').value,
      discount: disc, vat, items, total,
      notes: document.getElementById('f-notes').value.trim(),
    };
    invoices.push(inv);
    showToast('🎉 חשבונית נשמרה בהצלחה!', 'var(--green)');
  }

  save();
  closeModal('form-overlay');
  renderList();
}

// ─── INIT ────────────────────────────────────────────────
renderList();
</script>
